# Root Railway config for the public XO Pure CRM web service.
#
# Keep the Railway service Root Directory at `/` so the production Dockerfile
# can build the complete monorepo. This ships the fork-built twenty-server and
# twenty-front together; using the old frontend-only overlay caused runtime
# version skew and left the dashboard backend unavailable.

[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/twenty-docker/twenty/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/healthz"
healthcheckTimeout = 300
