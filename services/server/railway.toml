# services/server/railway.toml
#
# XO Pure CRM — Main web/server service configuration
#
# IMPORTANT RAILWAY DASHBOARD SETTINGS (required for custom frontend builds):
#   - Root Directory for this service MUST be set to `/` (repo root)
#   - Dockerfile path should point to `services/server/Dockerfile`
#
# This allows the multi-stage build in the Dockerfile to access the full monorepo
# so that `npx nx build twenty-front` (and twenty-shared) can run.
#
# The worker service can stay on the lightweight upstream image.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Restart on crash, but stop after 3 consecutive failures so we don't
# crash-loop into a wall (e.g. a broken migration).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Twenty exposes /healthz once the server is fully booted, including
# after migrations finish. Railway will mark the deploy unhealthy and
# auto-rollback if this never returns 200.
healthcheckPath = "/healthz"
healthcheckTimeout = 300

# We generally want intentional deploys rather than auto-deploy on every commit.
# You can control this in the Railway dashboard per service.

