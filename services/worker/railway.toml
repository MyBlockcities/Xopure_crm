# services/worker/railway.toml
#
# Twenty CRM — worker (background) service configuration
#
# CRITICAL: Keep the Docker image tag in services/worker/Dockerfile in sync
# with services/server/Dockerfile. Mismatched versions can cause queue issues.
#
# It is usually best to keep the worker on the pure upstream image
# (lightweight) while the server service uses the custom multi-stage build
# that includes your twenty-front changes.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Workers don't have an HTTP endpoint — no healthcheck.
# Railway will rely on process exit codes for health.
