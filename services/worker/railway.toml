# services/worker/railway.toml
#
# Twenty CRM — worker (background) service configuration
#
# Build the same fork image as the web service so the worker and server execute
# the same queue contracts. Keep the Railway service Root Directory at `/`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "packages/twenty-docker/twenty/Dockerfile"

[deploy]
startCommand = "yarn worker:prod"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Workers don't have an HTTP endpoint — no healthcheck.
# Railway will rely on process exit codes for health.
